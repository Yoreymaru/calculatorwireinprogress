<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Calculateur COIL EXPERT - WIP</title>
    <link href="style.css" rel="stylesheet"/>
</head>
<body>
    <div class="nav-bar">
        <div class="logo-button">
            <a href="https://www.wireinprogress.com" target="_blank">
                <img alt="Wire In Progress" src="images/wip_100_transparent.png"/>
            </a>
        </div>
        <div class="nav-buttons">
            <a href="calculateur_diy.html" title="Calculateur DIY">DIY</a>
            <a href="calculateur_coil.html" title="Calculateur COIL">COIL</a>
            <a href="calculateur_pretavaper.html" title="Calculateur PAV">PAV</a>
            <a href="coil_expert.html" title="Calculateur COIL EXPERT">COIL EXPERT</a>
        </div>
    </div>
    <header>
        <h1>Calculateur COIL EXPERT WIP</h1>
        <p>Calcul poussé pour les montages complexes</p>
    </header>
    <main>
        <label for="wireCount">Nombre de fils par coil :</label>
        <input id="wireCount" required="" type="number" value="2"/>
        <label for="resistanceByWire">Résistance d'un fil (Ω/m)</label>
        <input id="resistanceByWire" required="" type="number" value="15"/>
        <label for="lengthPerCoil">Longueur de fil utilisée (cm)</label>
        <input id="lengthPerCoil" required="" type="number" value="10"/>
        <button onclick="calculerExpert()">Calculer</button>
        <div class="result" id="resultat" style="display:none;"></div>
    </main>
    <footer>
        © 2025 Wire In Progress - Fait par des vapoteurs, pour des vapoteurs 🔧💨
    </footer>
    <script>
        function calculerExpert() {
            const count = parseFloat(document.getElementById('wireCount').value);
            const resPerMeter = parseFloat(document.getElementById('resistanceByWire').value);
            const lengthCm = parseFloat(document.getElementById('lengthPerCoil').value);

            const resistance = (resPerMeter * (lengthCm / 100)) / count;

            const resultat = `
                <strong>⚡ Résultat Expert :</strong><br><br>
                🔹 Résistance finale : <strong>${resistance.toFixed(3)} Ω</strong><br>
                🔹 Conductivité estimée : Haute
            `;

            document.getElementById('resultat').innerHTML = resultat;
            document.getElementById('resultat').style.display = 'block';
        }
    </script>
</body>
</html>
