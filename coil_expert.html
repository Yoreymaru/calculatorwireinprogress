<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Calculateur COIL EXPERT - WIP</title>
    <link href="style.css" rel="stylesheet"/>
</head>
<body>
    <div class="nav-bar">
        <div class="logo-button">
            <a href="https://www.wireinprogress.com" target="_blank">
                <img alt="Wire In Progress" src="images/wip_100_transparent.png"/>
            </a>
        </div>
        <div class="nav-buttons">
            <a href="calculateur_diy.html" title="Calculateur DIY">DIY</a>
            <a href="calculateur_coil.html" title="Calculateur COIL">COIL</a>
            <a href="calculateur_pretavaper.html" title="Calculateur PAV">PAV</a>
            <a href="coil_expert.html" title="Calculateur COIL EXPERT">COIL EXPERT</a>
        </div>
    </div>

    <header>
        <h1>Calculateur COIL EXPERT WIP</h1>
        <p>Montages complexes : Multi-âmes, Ribbon et Claptonnage</p>
    </header>

    <main>
        <label for="material">Matériau des âmes centrales :</label>
        <select id="material">
            <option value="0.00017">Kanthal A1 (0.00017 Ω·cm)</option>
            <option value="0.00017">Kanthal A1 Ribbon (0.00017 Ω·cm)</option>
            <option value="0.00011">Nichrome 80 (0.00011 Ω·cm)</option>
            <option value="0.00011">Nichrome 80 Ribbon (0.00011 Ω·cm)</option>
            <option value="0.00006">Nichrome 90 (0.00006 Ω·cm)</option>
            <option value="0.00006">Nichrome 90 Ribbon (0.00006 Ω·cm)</option>
            <option value="0.000075">SS316L (0.000075 Ω·cm)</option>
            <option value="0.000075">SS316L Ribbon (0.000075 Ω·cm)</option>
        </select>

        <label for="wrapMaterial">Matériau du claptonnage :</label>
        <select id="wrapMaterial">
            <option value="0.00017">Kanthal A1</option>
            <option value="0.00011">Nichrome 80</option>
            <option value="0.00006">Nichrome 90</option>
            <option value="0.000075">SS316L</option>
        </select>

        <label for="coreGauge">GA des âmes centrales :</label>
        <select id="coreGauge"></select>

        <label for="coreRibbon">Section Flat Ribbon pour les âmes centrales :</label>
        <select id="coreRibbon">
            <option value="Aucune">Aucune</option>
            <option value="0.2x0.1">0.2x0.1 mm</option>
            <option value="0.3x0.1">0.3x0.1 mm</option>
            <option value="0.4x0.1">0.4x0.1 mm</option>
            <option value="0.5x0.1">0.5x0.1 mm</option>
            <option value="0.8x0.1">0.8x0.1 mm</option>
        </select>

        <label for="coreRibbonCount">Nombre de fils Flat Ribbon :</label>
        <select id="coreRibbonCount"></select>

        <label for="coreCount">Nombre de fils (âmes centrales rondes) :</label>
        <select id="coreCount"></select>

        <label for="wrapGauge">GA du fil de claptonnage :</label>
        <select id="wrapGauge"></select>

        <label for="innerDiameter">Diamètre intérieur du coil :</label>
        <select id="innerDiameter">
            <option value="1">1 mm</option>
            <option value="1.5">1.5 mm</option>
            <option value="2">2 mm</option>
            <option selected value="2.5">2.5 mm</option>
            <option value="3">3 mm</option>
            <option value="3.5">3.5 mm</option>
            <option value="4">4 mm</option>
            <option value="4.5">4.5 mm</option>
            <option value="5">5 mm</option>
            <option value="5.5">5.5 mm</option>
            <option value="6">6 mm</option>
        </select>

        <label for="wraps">Nombre de tours :</label>
        <select id="wraps"></select>

        <label for="coils">Nombre de coils :</label>
        <select id="coils"></select>

        <button onclick="calculateResistance()">Calculer la résistance</button>

        <div class="result" id="result"></div>
    </main>

    <footer>
        © 2025 Wire In Progress - Fait par des vapoteurs, pour des vapoteurs 🔧💨
    </footer>

    <script>
        const awgToMm = {
            20: 0.812, 21: 0.723, 22: 0.644, 23: 0.573, 24: 0.511,
            25: 0.455, 26: 0.405, 27: 0.361, 28: 0.321, 29: 0.286,
            30: 0.255, 31: 0.227, 32: 0.202, 33: 0.180, 34: 0.160,
            35: 0.143, 36: 0.127, 37: 0.113, 38: 0.101, 39: 0.0897,
            40: 0.0799, 41: 0.0712, 42: 0.0635, 43: 0.0566, 44: 0.0504,
            45: 0.0447, 46: 0.0399, 47: 0.0355, 48: 0.0316, 49: 0.0282, 50: 0.0253
        };

        function populateSelect(id, min, max, defaultVal) {
            const select = document.getElementById(id);
            for (let i = min; i <= max; i++) {
                let opt = new Option(i, i);
                if (i === defaultVal) opt.selected = true;
                select.add(opt);
            }
        }

        function populateGaugeSelect(id, defaultGA) {
            const select = document.getElementById(id);
            for (let ga in awgToMm) {
                let opt = new Option(`${ga} GA (${awgToMm[ga]} mm)`, ga);
                if (parseInt(ga) === defaultGA) opt.selected = true;
                select.add(opt);
            }
        }

        window.onload = () => {
            populateGaugeSelect("coreGauge", 28);
            populateGaugeSelect("wrapGauge", 36);
            populateSelect("coreCount", 0, 25, 2);
            populateSelect("coreRibbonCount", 0, 10, 0);
            populateSelect("wraps", 1, 25, 6);
            populateSelect("coils", 1, 10, 1);
        };

        function calculateResistance() {
            const resis = parseFloat(document.getElementById("material").value);
            const coreGa = parseInt(document.getElementById("coreGauge").value);
            const coreNb = parseInt(document.getElementById("coreCount").value);
            const ribType = document.getElementById("coreRibbon").value;
            const ribNb = parseInt(document.getElementById("coreRibbonCount").value);
            const diam = parseFloat(document.getElementById("innerDiameter").value) / 10;
            const wraps = parseInt(document.getElementById("wraps").value);
            const coils = parseInt(document.getElementById("coils").value);

            const coreArea = (Math.PI * Math.pow((awgToMm[coreGa]/10)/2, 2)) * coreNb;

            let ribArea = 0;
            if(ribType !== "Aucune") {
                const dims = ribType.split('x');
                ribArea = (parseFloat(dims[0])/10 * parseFloat(dims[1])/10) * ribNb;
            }

            const totalArea = coreArea + ribArea;
            if(totalArea === 0) {
                document.getElementById("result").innerHTML = "Veuillez choisir au moins un fil d'âme.";
                document.getElementById("result").style.display = "block";
                return;
            }

            const length = Math.PI * diam * wraps;
            const resistance = (resis * length) / (totalArea * coils);

            document.getElementById("result").innerHTML = `
                <div style="color: #ffffff;">
                    <strong>Résistance estimée : ${resistance.toFixed(3)} Ω</strong><br>
                    Plage ±5% : ${(resistance*0.95).toFixed(3)} Ω à ${(resistance*1.05).toFixed(3)} Ω<br>
                    Section totale : ${(totalArea*100).toFixed(4)} mm²
                </div>
            `;
            document.getElementById("result").style.display = "block";
        }
    </script>
</body>
</html>
